{% extends 'base.html' %}
{% load static %}
{% block title %}Вход в комнату — Watchly{% endblock %}

{% block content %}

<div class="join-page">
  <div class="join-card" id="join-card">

    <!-- Замок SVG -->
    <div class="join-lock" id="join-lock">
      <svg class="lock-svg" id="lock-svg" viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Дужка замка (верхняя часть) -->
        <path class="lock-shackle" id="lock-shackle"
          d="M18 28 V20 C18 10.06 46 10.06 46 20 V28"
          stroke="url(#lockGold)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
        <!-- Корпус замка -->
        <rect class="lock-body" x="10" y="27" width="44" height="34" rx="6"
          fill="url(#lockBodyGrad)" stroke="url(#lockGold)" stroke-width="1.5"/>
        <!-- Скважина -->
        <circle cx="32" cy="42" r="5.5" fill="rgba(0,0,0,0.85)" stroke="#c9a84c" stroke-width="1"/>
        <rect x="29.5" y="43.5" width="5" height="7.5" rx="2.5" fill="rgba(0,0,0,0.85)" stroke="#c9a84c" stroke-width="0.8"/>
        <defs>
          <linearGradient id="lockGold" x1="10" y1="0" x2="54" y2="72" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c9a84c"/>
            <stop offset="50%" stop-color="#f0d898"/>
            <stop offset="100%" stop-color="#c9a84c"/>
          </linearGradient>
          <linearGradient id="lockBodyGrad" x1="10" y1="27" x2="54" y2="61" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a1520"/>
            <stop offset="100%" stop-color="#0d0b10"/>
          </linearGradient>
        </defs>
      </svg>
      <!-- Свечение вокруг замка -->
      <div class="lock-glow" id="lock-glow"></div>
    </div>

    <h1 class="join-title">Приватная комната</h1>
    <p class="join-room-name">{{ room.name }}</p>
    <p class="join-hint">Введи пароль чтобы войти</p>

    <div class="join-form-wrap" id="join-form-wrap">
      <div class="join-input-row">
        <input
          type="password"
          id="join-password"
          class="join-input"
          placeholder="••••••••"
          autocomplete="current-password"
          maxlength="64"
        >
        <button class="join-btn" id="join-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <div class="join-error" id="join-error"></div>
    </div>

    <div style="margin-top:20px;">
      <a href="/" class="btn btn-ghost btn-sm">← На главную</a>
    </div>
  </div>
</div>

<style>
/* ── Join page layout ── */
.join-page {
  min-height: calc(100vh - 64px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}

.join-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 20px;
  padding: 48px 40px 40px;
  width: 100%; max-width: 380px;
  text-align: center;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.05);
  backdrop-filter: blur(20px);
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* ── Замок ── */
.join-lock {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.lock-svg {
  width: 64px; height: 72px;
  filter: drop-shadow(0 0 12px rgba(201,168,76,0.25));
  transition: filter 0.4s ease;
}
.lock-glow {
  position: absolute; inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

/* Дужка открывается — поднимается вверх и чуть вправо */
.lock-svg.unlocking .lock-shackle {
  animation: shackle-open 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes shackle-open {
  0%   { transform: translate(0, 0) rotate(0deg); }
  60%  { transform: translate(6px, -10px) rotate(18deg); }
  100% { transform: translate(8px, -14px) rotate(22deg); }
}

/* Замок подсвечивается при открытии */
.lock-svg.unlocking {
  filter: drop-shadow(0 0 24px rgba(240,216,152,0.7));
}
.lock-svg.unlocking ~ .lock-glow {
  opacity: 1;
}

/* ── Типографика ── */
.join-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem; font-weight: 900;
  color: var(--text);
  margin-bottom: 6px; letter-spacing: -0.5px;
}
.join-room-name {
  font-size: 1rem; font-weight: 600;
  background: linear-gradient(90deg, #c9a84c, #f0d898);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.join-hint {
  color: var(--text-dim); font-size: 0.88rem;
  margin-bottom: 28px;
}

/* ── Форма ── */
.join-input-row {
  display: flex; gap: 8px; align-items: center;
}
.join-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 1.1rem;
  letter-spacing: 3px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.join-input:focus {
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}
.join-input.error {
  border-color: rgba(220,60,60,0.5);
  animation: input-shake 0.4s ease;
}
@keyframes input-shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

.join-btn {
  width: 46px; height: 46px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #c9a84c, #f0d898);
  display: flex; align-items: center; justify-content: center;
  color: #09080b; cursor: pointer; border: none;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  box-shadow: 0 4px 16px rgba(201,168,76,0.3);
}
.join-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
.join-btn:active { transform: translateY(0); }
.join-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.join-error {
  margin-top: 10px; min-height: 18px;
  font-size: 0.82rem; color: #e05050;
  opacity: 0; transition: opacity 0.2s;
}
.join-error.show { opacity: 1; }
</style>

<script>
(function() {
  var CHECK_URL  = "{% url 'rooms:check_password' room.code %}";
  var DETAIL_URL = "{% url 'rooms:detail' room.code %}";
  var CSRF       = "{{ csrf_token }}";

  var inp      = document.getElementById('join-password');
  var btn      = document.getElementById('join-btn');
  var errEl    = document.getElementById('join-error');
  var lockSvg  = document.getElementById('lock-svg');
  var lockGlow = document.getElementById('lock-glow');
  var card     = document.getElementById('join-card');
  var overlay  = document.getElementById('fairy-overlay');
  var canvas   = document.getElementById('fairy-canvas');
  var ctx      = canvas.getContext('2d');

  /* ── Феи ── */
  var fairies = [];
  var flyingOut = false;
  var rafId = null;
  var TRAIL_LEN = 12;

  var PALETTE = [
    [240, 200, 100],   // золото
    [255, 215, 120],   // светлое золото
    [201, 168,  76],   // тёмное золото
    [255, 235, 160],   // почти белое золото
    [220, 180,  60],   // янтарь
  ];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createFairy() {
    var col = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.6 + Math.random() * 1.2;
    /* Синусоидальное отклонение — звезда виляет как фея */
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1.5 + Math.random() * 2.5,
      col: col,
      alpha: 0,            // нарастает при появлении
      born: performance.now(),
      phase: Math.random() * Math.PI * 2,  // фаза виляния
      waveAmp: 0.4 + Math.random() * 0.6,  // амплитуда виляния
      waveFreq: 0.04 + Math.random() * 0.06,
      trail: [],
      exitVx: 0,
      exitVy: 0,
    };
  }

  function drawFairy(f) {
    /* Хвост */
    for (var t = 0; t < f.trail.length; t++) {
      var tp = f.trail[t];
      var tAlpha = (t / f.trail.length) * f.alpha * 0.5;
      var tSize  = f.size * (t / f.trail.length) * 0.8;
      if (tAlpha < 0.01 || tSize < 0.2) continue;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, tSize, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + f.col[0] + ',' + f.col[1] + ',' + f.col[2] + ',' + tAlpha + ')';
      ctx.fill();
    }

    /* Ядро */
    if (f.alpha < 0.01) return;
    var grd = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 4);
    grd.addColorStop(0,   'rgba(' + f.col[0] + ',' + f.col[1] + ',' + f.col[2] + ',' + f.alpha + ')');
    grd.addColorStop(0.3, 'rgba(' + f.col[0] + ',' + f.col[1] + ',' + f.col[2] + ',' + (f.alpha * 0.5) + ')');
    grd.addColorStop(1,   'rgba(' + f.col[0] + ',' + f.col[1] + ',' + f.col[2] + ',0)');
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    /* Яркое ядро */
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + f.alpha + ')';
    ctx.fill();
  }

  function tick(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < fairies.length; i++) {
      var f = fairies[i];

      /* Alpha нарастает в первые 400ms */
      var age = now - f.born;
      if (!flyingOut) {
        f.alpha = Math.min(1, age / 400);
      } else {
        f.alpha = Math.max(0, f.alpha - 0.025);
      }

      /* Виляние — синусоидальное отклонение перпендикулярно курсу */
      if (!flyingOut) {
        var wave = Math.sin(f.phase + now * f.waveFreq) * f.waveAmp;
        f.x += f.vx + (-f.vy / (Math.abs(f.vx) + Math.abs(f.vy) + 0.001)) * wave;
        f.y += f.vy + ( f.vx / (Math.abs(f.vx) + Math.abs(f.vy) + 0.001)) * wave;

        /* Отражение от краёв */
        if (f.x < 0)              { f.x = 0;              f.vx =  Math.abs(f.vx); }
        if (f.x > canvas.width)   { f.x = canvas.width;   f.vx = -Math.abs(f.vx); }
        if (f.y < 0)              { f.y = 0;              f.vy =  Math.abs(f.vy); }
        if (f.y > canvas.height)  { f.y = canvas.height;  f.vy = -Math.abs(f.vy); }
      } else {
        /* Улетают к своей точке выхода */
        f.x += f.exitVx;
        f.y += f.exitVy;
      }

      /* Запись следа */
      f.trail.push({ x: f.x, y: f.y });
      if (f.trail.length > TRAIL_LEN) f.trail.shift();

      drawFairy(f);
    }

    rafId = requestAnimationFrame(tick);
  }

  function startFairies() {
    resize();
    fairies = [];
    for (var i = 0; i < 38; i++) {
      var f = createFairy();
      /* Стагерируем появление */
      f.born = performance.now() + i * 30;
      fairies.push(f);
    }
    rafId = requestAnimationFrame(tick);
  }

  function exitFairies() {
    flyingOut = true;
    var cx = canvas.width  / 2;
    var cy = canvas.height / 2;
    for (var i = 0; i < fairies.length; i++) {
      var f = fairies[i];
      var dx = f.x - cx;
      var dy = f.y - cy;
      var len = Math.sqrt(dx*dx + dy*dy) || 1;
      var spd = 8 + Math.random() * 6;
      f.exitVx = (dx / len) * spd;
      f.exitVy = (dy / len) * spd;
    }
  }

  function stopFairies() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  /* ── Ошибки ── */
  function showError(msg) {
    inp.classList.add('error');
    errEl.textContent = msg;
    errEl.classList.add('show');
    setTimeout(function() { inp.classList.remove('error'); }, 500);
  }
  function clearError() {
    errEl.classList.remove('show');
    inp.classList.remove('error');
  }

  /* ── Анимация разблокировки ── */
  function playUnlock() {
    /* 1. Замок открывается */
    lockSvg.classList.add('unlocking');
    if (lockGlow) lockGlow.style.opacity = '1';

    /* 2. Карточка гаснет */
    setTimeout(function() {
      card.style.transform = 'scale(0.92)';
      card.style.opacity   = '0';
    }, 180);

    /* 3. Мгновенно переходим — вся анимация фей на странице комнаты */
    setTimeout(function() {
      window.location.href = DETAIL_URL;
    }, 600);
  }

  /* ── Submit ── */
  function submit() {
    var pwd = inp.value.trim();
    if (!pwd) { showError('Введи пароль'); return; }
    clearError();
    btn.disabled = true;
    inp.disabled = true;

    fetch(CHECK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ password: pwd })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        playUnlock();
      } else {
        btn.disabled = false;
        inp.disabled = false;
        inp.value = '';
        inp.focus();
        showError('Неверный пароль');
      }
    })
    .catch(function() {
      btn.disabled = false;
      inp.disabled = false;
      showError('Ошибка соединения');
    });
  }

  btn.addEventListener('click', submit);
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit(); });
  inp.addEventListener('input', clearError);
  window.addEventListener('resize', function() { if (overlay.classList.contains('active')) resize(); });
})();
</script>

{% endblock %}
